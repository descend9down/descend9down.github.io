<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEP RIGHT UP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    width: 100vw; height: 100vh;
    overflow: hidden;
    cursor: crosshair;
    font-family: 'Courier New', monospace;
  }
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  #base-img {
    position: absolute;
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    transition: opacity 0.4s;
    pointer-events: none; user-select: none;
  }
  #kaleidoscope-canvas, #shard-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #kaleidoscope-canvas { opacity: 0; transition: opacity 0.8s; }
  #ui {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 16px; z-index: 100; align-items: center;
  }
  .btn {
    background: transparent;
    border: 1px solid rgba(180, 140, 20, 0.6);
    color: rgba(220, 180, 60, 0.85);
    padding: 8px 20px;
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .btn:hover {
    background: rgba(180, 140, 20, 0.15);
    border-color: rgba(220, 180, 60, 0.85);
    color: #fff; box-shadow: 0 0 12px rgba(180, 140, 20, 0.4);
  }
  #mode-label {
    position: fixed; top: 28px; left: 50%;
    transform: translateX(-50%);
    color: rgba(220, 180, 60, 0.85);
    font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
    z-index: 100; pointer-events: none;
  }
  #hint {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%);
    color: rgba(220, 180, 60, 0.65);
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    pointer-events: none; transition: opacity 1s;
  }
  /* Watermark */
  #watermark {
    position: fixed;
    bottom: 14px; right: 18px;
    color: rgba(255,255,255,0.12);
    font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 200;
    font-family: 'Courier New', monospace;
  }
  /* Magnifier */
  #lens {
    position: fixed;
    width: 180px; height: 180px;
    border-radius: 50%;
    border: 1px solid rgba(220, 180, 60, 0.85);
    box-shadow: 0 0 20px rgba(180, 140, 20, 0.4), inset 0 0 20px rgba(0,0,0,0.4);
    pointer-events: none;
    display: none;
    overflow: hidden;
    z-index: 300;
    transform: translate(-50%, -50%);
  }
  #lens canvas {
    position: absolute; top: 0; left: 0;
  }
  body.lens-active { cursor: none; }
</style>
</head>
<body>
<div id="stage">
  <img id="base-img" />
  <canvas id="kaleidoscope-canvas"></canvas>
  <canvas id="shard-canvas"></canvas>
</div>
<div id="mode-label">STEP RIGHT UP</div>
<div id="hint">CLICK TO SHATTER &nbsp;|&nbsp; SPACE: KALEIDOSCOPE &nbsp;|&nbsp; L: LENS</div>
<div id="watermark">©D9D 2026</div>
<div id="lens"><canvas id="lens-canvas"></canvas></div>
<div id="ui">
  <button class="btn" onclick="resetAll()">RESET</button>
  <button class="btn" onclick="toggleKaleidoscope()">KALEIDOSCOPE</button>
  <button class="btn" onclick="toggleLens()">LENS</button>
  <button class="btn" onclick="shatterAll()">SHATTER</button>
</div>

  analyzeImage();
  resizeAll();
  setTimeout(() => { hint.style.opacity = '0'; }, 4000);
};
beholderImg.src = IMG_SRC;

function buildOffscreen() {
  offscreen = document.createElement('canvas');
  const W = window.innerWidth, H = window.innerHeight;
  offscreen.width = W;
  offscreen.height = H;
  const ctx = offscreen.getContext('2d');
  ctx.clearRect(0, 0, W, H);
  // Draw image centered/contained
  const iW = beholderImg.naturalWidth, iH = beholderImg.naturalHeight;
  const scale = Math.min(W / iW, H / iH);
  const dW = iW * scale, dH = iH * scale;
  const dx = (W - dW) / 2, dy = (H - dH) / 2;
  ctx.drawImage(beholderImg, dx, dy, dW, dH);
  // Store rect for shard positioning
  offscreen._imgRect = { left: dx, top: dy, width: dW, height: dH, right: dx+dW, bottom: dy+dH };
}

function resizeAll() {
  kCanvas.width = sCanvas.width = window.innerWidth;
  kCanvas.height = sCanvas.height = window.innerHeight;
  lensCanvas.width = 180; lensCanvas.height = 180;
  buildOffscreen();
  if (kaleidMode) drawKaleidoscope();
}
window.addEventListener('resize', resizeAll);

// ─── SHATTER ─────────────────────────────────────────────
document.getElementById('stage').addEventListener('click', (e) => {
  if (!imgLoaded || lensMode) return;
  createVoronoiShards(e.clientX, e.clientY);
  img.style.opacity = '0';
  kCanvas.style.opacity = '0';
  kaleidMode = false;
  if (kAnimId) { cancelAnimationFrame(kAnimId); kAnimId = null; }
  modeLabel.textContent = 'SHATTERED';
  startShardAnim();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); toggleKaleidoscope(); }
  if (e.code === 'KeyR') resetAll();
  if (e.code === 'KeyL') toggleLens();
  if (e.key >= '2' && e.key <= '9') {
    kSlices = parseInt(e.key) * 2;
    if (kaleidMode) drawKaleidoscope();
  }
});

// ─── IMAGE ANALYSIS ──────────────────────────────────────
function analyzeImage() {
  const W = 120, H = 60;
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const ctx = off.getContext('2d');
  ctx.drawImage(beholderImg, 0, 0, W, H);
  const data = ctx.getImageData(0, 0, W, H).data;
  const candidates = [];
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const lum = 0.299*r + 0.587*g + 0.114*b;
      const purpleness = (r * 0.5 + b * 0.8) - g * 0.6;
      const score = lum * 0.4 + purpleness * 0.6;
      if (score > 60) candidates.push({ x: x/W, y: y/H, score });
    }
  }
  candidates.sort((a, b) => b.score - a.score);
  voronoiSeeds = [];
  const minDist = 0.08;
  for (const c of candidates) {
    let tooClose = false;
    for (const s of voronoiSeeds) {
      const dx = c.x - s.x, dy = c.y - s.y;
      if (Math.sqrt(dx*dx + dy*dy) < minDist) { tooClose = true; break; }
    }
    if (!tooClose) voronoiSeeds.push(c);
    if (voronoiSeeds.length >= 55) break;
  }
  while (voronoiSeeds.length < 40) {
    voronoiSeeds.push({ x: 0.05 + Math.random()*0.9, y: 0.05 + Math.random()*0.9, score: 0 });
  }
}

// ─── VORONOI ─────────────────────────────────────────────
function getImgRect() {
  return offscreen ? offscreen._imgRect : img.getBoundingClientRect();
}

function convexHull(pts) {
  if (pts.length < 3) return pts;
  pts = pts.slice().sort((a, b) => a.x - b.x || a.y - b.y);
  const n = pts.length, hull = [];
  for (let i = 0; i < n; i++) {
    while (hull.length >= 2) {
      const a = hull[hull.length-2], b = hull[hull.length-1], c = pts[i];
      if ((b.x-a.x)*(c.y-a.y) - (b.y-a.y)*(c.x-a.x) <= 0) hull.pop(); else break;
    }
    hull.push(pts[i]);
  }
  const lower = hull.length + 1;
  for (let i = n-2; i >= 0; i--) {
    while (hull.length >= lower) {
      const a = hull[hull.length-2], b = hull[hull.length-1], c = pts[i];
      if ((b.x-a.x)*(c.y-a.y) - (b.y-a.y)*(c.x-a.x) <= 0) hull.pop(); else break;
    }
    hull.push(pts[i]);
  }
  hull.pop();
  return hull;
}

function buildVoronoiPolygons(seeds, rect) {
  const screenSeeds = seeds.map(s => ({
    x: rect.left + s.x * rect.width,
    y: rect.top + s.y * rect.height,
    score: s.score
  }));
  const gridW = 200, gridH = 100;
  const cellW = (rect.width + 100) / gridW;
  const cellH = (rect.height + 100) / gridH;
  const assignment = new Int32Array(gridW * gridH);
  for (let gy = 0; gy < gridH; gy++) {
    for (let gx = 0; gx < gridW; gx++) {
      const px = rect.left - 50 + (gx + 0.5) * cellW;
      const py = rect.top - 50 + (gy + 0.5) * cellH;
      let minD = Infinity, minI = 0;
      for (let si = 0; si < screenSeeds.length; si++) {
        const dx = px - screenSeeds[si].x, dy = py - screenSeeds[si].y;
        const d = dx*dx + dy*dy;
        if (d < minD) { minD = d; minI = si; }
      }
      assignment[gy * gridW + gx] = minI;
    }
  }
  return screenSeeds.map((seed, si) => {
    const pts = [];
    for (let gy = 0; gy < gridH; gy++) {
      for (let gx = 0; gx < gridW; gx++) {
        if (assignment[gy * gridW + gx] === si) {
          pts.push({ x: rect.left - 50 + (gx + 0.5) * cellW, y: rect.top - 50 + (gy + 0.5) * cellH });
        }
      }
    }
    return { seed, poly: convexHull(pts) };
  }).filter(c => c.poly.length >= 3);
}

function createVoronoiShards(cx, cy) {
  if (animId) cancelAnimationFrame(animId);
  shards = [];
  sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
  const rect = getImgRect();
  const cells = buildVoronoiPolygons(voronoiSeeds, rect);
  for (const cell of cells) {
    const screenX = rect.left + cell.seed.x * rect.width;
    const screenY = rect.top + cell.seed.y * rect.height;
    const dx = screenX - cx, dy = screenY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const force = Math.max(1.5, 700 / dist);
    const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.6;
    const centX = cell.poly.reduce((s, p) => s + p.x, 0) / cell.poly.length;
    const centY = cell.poly.reduce((s, p) => s + p.y, 0) / cell.poly.length;
    const jitteredPoly = cell.poly.map(p => ({ x: p.x + (Math.random()-0.5)*4, y: p.y + (Math.random()-0.5)*4 }));
    shards.push({
      poly: jitteredPoly, centX, centY,
      x: 0, y: 0,
      vx: Math.cos(angle) * force * (0.5 + Math.random() * 0.9),
      vy: Math.sin(angle) * force * (0.5 + Math.random() * 0.9) - Math.random() * 4,
      gravity: 0.15 + Math.random() * 0.15,
      rot: 0, rotV: (Math.random() - 0.5) * 0.05,
      alpha: 1, life: 1, score: cell.seed.score || 0
    });
  }
}

function drawShardFrame() {
  sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
  let alive = false;
  for (const s of shards) {
    if (s.life <= 0) continue;
    alive = true;
    s.x += s.vx; s.y += s.vy; s.vy += s.gravity;
    s.vx *= 0.988; s.rot += s.rotV;
    s.life -= 0.007;
    s.alpha = Math.min(1, s.life * 2.5);
    sCtx.save();
    sCtx.globalAlpha = s.alpha;
    sCtx.translate(s.centX + s.x, s.centY + s.y);
    sCtx.rotate(s.rot);
    sCtx.translate(-s.centX, -s.centY);
    sCtx.beginPath();
    sCtx.moveTo(s.poly[0].x, s.poly[0].y);
    for (let i = 1; i < s.poly.length; i++) sCtx.lineTo(s.poly[i].x, s.poly[i].y);
    sCtx.closePath();
    sCtx.clip();
    // Draw from offscreen canvas — this is the fix
    sCtx.drawImage(offscreen, 0, 0);
    const edgeBright = Math.min(1, 0.5 + (s.score / 200) * 0.5);
    sCtx.strokeStyle = `rgba(220, 160, 40, ${s.alpha * edgeBright})`;
    sCtx.lineWidth = 0.8 + (s.score / 150);
    sCtx.beginPath();
    sCtx.moveTo(s.poly[0].x, s.poly[0].y);
    for (let i = 1; i < s.poly.length; i++) sCtx.lineTo(s.poly[i].x, s.poly[i].y);
    sCtx.closePath();
    sCtx.stroke();
    sCtx.restore();
  }
  if (alive) {
    animId = requestAnimationFrame(drawShardFrame);
  } else {
    sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
    img.style.opacity = '1';
    modeLabel.textContent = 'STEP RIGHT UP';
    shards = [];
  }
}

function startShardAnim() {
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(drawShardFrame);
}

// ─── KALEIDOSCOPE ────────────────────────────────────────
function toggleKaleidoscope() {
  if (!imgLoaded) return;
  kaleidMode = !kaleidMode;
  if (kaleidMode) {
    img.style.opacity = '0';
    kCanvas.style.opacity = '1';
    hint.style.opacity = '0';
    animateKaleid();
  } else {
    kCanvas.style.opacity = '0';
    img.style.opacity = '1';
    if (kAnimId) cancelAnimationFrame(kAnimId);
    modeLabel.textContent = 'STEP RIGHT UP';
  }
}

function animateKaleid() {
  kTime += 0.004;
  drawKaleidoscope();
  if (kaleidMode) kAnimId = requestAnimationFrame(animateKaleid);
}

function drawKaleidoscope() {
  if (!imgLoaded) return;
  const W = kCanvas.width, H = kCanvas.height;
  kCtx.clearRect(0, 0, W, H);
  kCtx.fillStyle = '#000'; kCtx.fillRect(0, 0, W, H);
  const cx = W/2, cy = H/2;
  const sliceAngle = (Math.PI * 2) / kSlices;
  const iW = beholderImg.naturalWidth, iH = beholderImg.naturalHeight;
  const scale = Math.max(W/iW, H/iH) * 0.8;
  const sW = iW*scale, sH = iH*scale;
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  octx.drawImage(beholderImg, cx - sW/2, cy - sH/2, sW, sH);
  const radius = Math.min(W, H) * 0.52;
  for (let s = 0; s < kSlices; s++) {
    kCtx.save();
    kCtx.translate(cx, cy);
    kCtx.rotate(s * sliceAngle + kTime);
    kCtx.beginPath();
    kCtx.moveTo(0, 0);
    kCtx.arc(0, 0, radius, -sliceAngle/2, sliceAngle/2);
    kCtx.closePath();
    kCtx.clip();
    if (s % 2 === 1) kCtx.scale(1, -1);
    kCtx.rotate(kTime * 0.3 * (s % 2 === 0 ? 1 : -1));
    kCtx.drawImage(off, -cx, -cy, W, H);
    kCtx.restore();
  }
  const grad = kCtx.createRadialGradient(cx, cy, radius*0.6, cx, cy, radius*1.1);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(0,0,0,0.85)');
  kCtx.fillStyle = grad; kCtx.fillRect(0, 0, W, H);
  const cGrad = kCtx.createRadialGradient(cx, cy, 0, cx, cy, 60);
  cGrad.addColorStop(0, 'rgba(220,160,40,0.25)');
  cGrad.addColorStop(1, 'transparent');
  kCtx.fillStyle = cGrad; kCtx.fillRect(0, 0, W, H);
  modeLabel.textContent = `KALEIDOSCOPE ✦ ${kSlices} AXES`;
}

// ─── MAGNIFYING LENS ─────────────────────────────────────
function toggleLens() {
  lensMode = !lensMode;
  if (lensMode) {
    document.body.classList.add('lens-active');
    lensEl.style.display = 'block';
    modeLabel.textContent = 'LENS ACTIVE';
  } else {
    document.body.classList.remove('lens-active');
    lensEl.style.display = 'none';
    modeLabel.textContent = 'STEP RIGHT UP';
  }
}

document.addEventListener('mousemove', (e) => {
  if (!lensMode || !imgLoaded) return;
  const mx = e.clientX, my = e.clientY;
  lensEl.style.left = mx + 'px';
  lensEl.style.top = my + 'px';

  const lW = 180, lH = 180;
  lensCtx.clearRect(0, 0, lW, lH);

  // Draw zoomed image section
  const rect = getImgRect();
  // Map lens center to image coords
  const relX = (mx - rect.left) / rect.width;
  const relY = (my - rect.top) / rect.height;
  const iW = beholderImg.naturalWidth, iH = beholderImg.naturalHeight;
  const srcX = relX * iW - (lW / ZOOM) / 2;
  const srcY = relY * iH - (lH / ZOOM) / 2;
  const srcW = lW / ZOOM, srcH = lH / ZOOM;

  // Circular clip
  lensCtx.save();
  lensCtx.beginPath();
  lensCtx.arc(lW/2, lH/2, lW/2, 0, Math.PI*2);
  lensCtx.clip();
  lensCtx.drawImage(beholderImg, srcX, srcY, srcW, srcH, 0, 0, lW, lH);

  // Subtle edge vignette inside lens
  const vign = lensCtx.createRadialGradient(lW/2, lH/2, lW*0.3, lW/2, lH/2, lW/2);
  vign.addColorStop(0, 'transparent');
  vign.addColorStop(1, 'rgba(0,0,0,0.5)');
  lensCtx.fillStyle = vign;
  lensCtx.fillRect(0, 0, lW, lH);
  lensCtx.restore();
});

// ─── SHATTER ALL / RESET ─────────────────────────────────
function shatterAll() {
  createVoronoiShards(window.innerWidth/2, window.innerHeight/2);
  img.style.opacity = '0';
  kCanvas.style.opacity = '0';
  kaleidMode = false;
  if (kAnimId) { cancelAnimationFrame(kAnimId); kAnimId = null; }
  modeLabel.textContent = 'SHATTERED';
  startShardAnim();
}

function resetAll() {
  if (animId) cancelAnimationFrame(animId);
  if (kAnimId) cancelAnimationFrame(kAnimId);
  shards = []; lensMode = false;
  sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
  kaleidMode = false;
  img.style.opacity = '1';
  kCanvas.style.opacity = '0';
  lensEl.style.display = 'none';
  document.body.classList.remove('lens-active');
  modeLabel.textContent = 'STEP RIGHT UP';
}
</script>
</body>
